<!DOCTYPE html>
<html>
<head>
    <title>JS Exercise 2</title>
</head>
<body>

<h1>JS Exercise 2</h1>

<label>First Name:</label>
<input type="text" id="fname"><br><br>

<label>Middle Name:</label>
<input type="text" id="mname"><br><br>

<label>Last Name:</label>
<input type="text" id="lname"><br><br>

<button onclick="generateName()">Generate Fullname</button>
<button onclick="clearName()">Clear Entries</button>

<h3>Full Name:</h3>
<p id="fullname"></p>

<script>
function generateName() {
    let first = document.getElementById("fname").value;
    let middle = document.getElementById("mname").value;
    let last = document.getElementById("lname").value;

    let full = first + " " + middle + " " + last;

    document.getElementById("fullname").innerHTML = full;
}

function clearName() {
    document.getElementById("fname").value = "";
    document.getElementById("mname").value = "";
    document.getElementById("lname").value = "";
    document.getElementById("fullname").innerHTML = "";
}
</script>

</body>
</html>
